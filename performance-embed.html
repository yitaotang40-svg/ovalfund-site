<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oval Fund | Embedded Performance Chart</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .embed-root {
      position: relative;
      height: 100%;
      padding: 8px 10px 12px;
      box-sizing: border-box;
      background: transparent;
    }

    .embed-chart {
      position: relative;
      height: 100%;
      min-height: 280px;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
    }

    .embed-chart canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .embed-status {
      position: absolute;
      left: 20px;
      bottom: 10px;
      font-size: 12px;
      color: rgba(59, 71, 86, 0.8);
      background: rgba(255, 255, 255, 0.8);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .embed-status.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="embed-root">
    <div class="embed-chart">
      <canvas id="retChart" aria-label="Return chart" role="img"></canvas>
    </div>
    <div id="status" class="embed-status hidden">—</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script defer>
    (() => {
      const DATA_URL = 'data/performance.csv';
      const statusEl = document.getElementById('status');

      function setStatus(message, show = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle('hidden', !show);
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let field = '';
        let inQuotes = false;

        for (let i = 0; i < text.length; i += 1) {
          const c = text[i];
          if (inQuotes) {
            if (c === '"') {
              if (text[i + 1] === '"') {
                field += '"';
                i += 1;
              } else {
                inQuotes = false;
              }
            } else {
              field += c;
            }
          } else if (c === '"') {
            inQuotes = true;
          } else if (c === ',') {
            row.push(field);
            field = '';
          } else if (c === '\n') {
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else if (c !== '\r') {
            field += c;
          }
        }

        if (field.length || row.length) {
          row.push(field);
          rows.push(row);
        }

        return rows.filter((line) => line.some((value) => String(value).trim() !== ''));
      }

      function normalizeHeader(header) {
        return String(header || '')
          .replace(/^\uFEFF/, '')
          .trim()
          .toLowerCase()
          .replace(/\s+/g, ' ');
      }

      function findCol(headers, candidates) {
        const map = headers.map(normalizeHeader);
        for (const candidate of candidates) {
          const idx = map.indexOf(normalizeHeader(candidate));
          if (idx !== -1) {
            return idx;
          }
        }
        return -1;
      }

      function parseNumber(value) {
        const raw = String(value ?? '').trim();
        if (!raw) {
          return Number.NaN;
        }
        const cleaned = raw.replace(/[%$,]/g, '').replace(/,/g, '').replace(/\s+/g, '');
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : Number.NaN;
      }

      function parseDateValue(value) {
        const raw = String(value || '').trim();
        if (!raw) {
          return null;
        }

        if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(raw)) {
          const [year, month, day] = raw.split('-').map((part) => parseInt(part, 10));
          return new Date(Date.UTC(year, month - 1, day));
        }

        const timestamp = Date.parse(raw);
        if (!Number.isFinite(timestamp)) {
          return null;
        }

        const date = new Date(timestamp);
        return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
      }

      function formatISODate(date) {
        const year = date.getUTCFullYear();
        const month = String(date.getUTCMonth() + 1).padStart(2, '0');
        const day = String(date.getUTCDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      async function loadChart() {
        try {
          const res = await fetch(DATA_URL, { cache: 'no-store' });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const rows = parseCSV(await res.text());
          if (rows.length < 2) {
            throw new Error('CSV is empty');
          }

          const headers = rows[0];
          const idxDate = findCol(headers, ['Date', '日期']);
          const idxSharePrice = findCol(headers, ['Share Price', 'SharePrice', 'NAV', 'Unit Price', '单位净值']);
          const idxSP = findCol(headers, ['SP500', 'S&P 500', 'SP 500', 'SPX']);
          const idxBRK = findCol(headers, ['BRK', 'BRK.B', 'BRK B']);

          if ([idxDate, idxSharePrice, idxSP, idxBRK].some((index) => index === -1)) {
            throw new Error('Missing required columns');
          }

          const dates = [];
          const fundPrice = [];
          const sp = [];
          const brk = [];

          for (let i = 1; i < rows.length; i += 1) {
            const row = rows[i];
            const date = parseDateValue(row[idxDate]);
            const fund = parseNumber(row[idxSharePrice]);
            const spValue = parseNumber(row[idxSP]);
            const brkValue = parseNumber(row[idxBRK]);

            if (!date || !Number.isFinite(fund) || !Number.isFinite(spValue) || !Number.isFinite(brkValue)) {
              continue;
            }

            dates.push(date);
            fundPrice.push(fund);
            sp.push(spValue);
            brk.push(brkValue);
          }

          if (dates.length < 2) {
            throw new Error('Not enough usable rows');
          }

          const order = dates
            .map((date, index) => ({ time: date.getTime(), index }))
            .sort((left, right) => left.time - right.time)
            .map((item) => item.index);

          const orderedDates = order.map((index) => dates[index]);
          const orderedFund = order.map((index) => fundPrice[index]);
          const orderedSp = order.map((index) => sp[index]);
          const orderedBrk = order.map((index) => brk[index]);

          const baseFund = orderedFund[0];
          const baseSp = orderedSp[0];
          const baseBrk = orderedBrk[0];

          const fundRet = orderedFund.map((value) => (value / baseFund) * 100 - 100);
          const spRet = orderedSp.map((value) => (value / baseSp) * 100 - 100);
          const brkRet = orderedBrk.map((value) => (value / baseBrk) * 100 - 100);
          const labels = orderedDates.map((date) => formatISODate(date));

          new Chart(document.getElementById('retChart'), {
            type: 'line',
            data: {
              labels,
              datasets: [
                {
                  label: 'Fund',
                  data: fundRet,
                  borderColor: '#133a66',
                  borderWidth: 2.4,
                  pointRadius: 0,
                  tension: 0.25
                },
                {
                  label: 'S&P 500',
                  data: spRet,
                  borderColor: '#7b9ab8',
                  borderWidth: 2,
                  pointRadius: 0,
                  tension: 0.25
                },
                {
                  label: 'BRK',
                  data: brkRet,
                  borderColor: '#c28f43',
                  borderWidth: 2,
                  pointRadius: 0,
                  tension: 0.25
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: {
                  position: 'top',
                  labels: {
                    boxWidth: 14,
                    color: '#3b4756'
                  }
                },
                tooltip: {
                  callbacks: {
                    label(context) {
                      return `${context.dataset.label}: ${context.parsed.y.toFixed(2)}%`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  ticks: {
                    maxTicksLimit: 8,
                    color: '#66707d'
                  },
                  grid: {
                    display: false
                  }
                },
                y: {
                  ticks: {
                    color: '#66707d',
                    callback(value) {
                      return `${Number(value).toFixed(2)}%`;
                    }
                  },
                  grid: {
                    color: 'rgba(16, 24, 32, 0.08)'
                  }
                }
              }
            }
          });

          setStatus(`已加载 ${orderedDates.length} 条记录`, false);
        } catch (error) {
          console.error(error);
          setStatus('业绩数据暂时不可用', true);
        }
      }

      document.addEventListener('DOMContentLoaded', loadChart);
    })();
  </script>
</body>
</html>
